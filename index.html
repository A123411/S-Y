<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عرض احترافي</title>
    <style>
        /* تصفير كل الهوامش وإلغاء السكرول والزوم */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden; /* يمنع السكرول تماماً وقت الفيديو */
            touch-action: none; /* يمنع حركات الزوم بالصوابع */
        }

        .media-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ضبط الفيديو والصورة بالملي على مقاس الشاشة */
        #intro-video, #after-video-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* يخلي الميديا تفرش بالملي بدون فراغات سوداء */
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            border: none;
        }

        /* إخفاء الصورة في البداية */
        #after-video-img {
            display: none;
        }
    </style>
</head>
<body>

    <div class="media-container">
        <video id="intro-video" autoplay muted playsinline loop="false">
            <source src="Video mmm.MOV" type="video/mp4">
        </video>

        <img id="after-video-img" src="ضع_اسم_الصورة_الثابتة_هنا.jpg" alt="">
    </div>

    <script>
        const video = document.getElementById('intro-video');
        const img = document.getElementById('after-video-img');

        // محاولة تشغيل الفيديو إجبارياً حتى لو المتصفح حاول يمنعه
        window.addEventListener('DOMContentLoaded', () => {
            video.play().catch(error => {
                // لو المتصفح لسه غلس، أول ما يلمس الشاشة في أي حتة يشتغل فوراً
                document.addEventListener('click', () => { video.play(); }, { once: true });
                document.addEventListener('touchstart', () => { video.play(); }, { once: true });
            });
        });

        // أول ما الفيديو يخلص: يخفيه ويظهر الصورة، ويفتح السكرول لو الصورة طويلة
        video.onended = function() {
            video.style.display = 'none';
            img.style.display = 'block';
            
            // السماح بالسكرول بعد ما الفيديو يخلص عشان تشوف الصورة براحتك
            document.body.style.overflow = 'auto';
            document.documentElement.style.overflow = 'auto';
        };
    </script>

</body>
</html>
