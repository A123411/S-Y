<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية</title>
    <style>
        /* تصفير الهوامش لضمان الالتصاق بالسقف تماماً */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow-x: hidden;
        }

        /* حاوية الميديا الكاملة */
        .media-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* تنسيق الفيديو والصورة لملء العرض ومنع الفراغات */
        .media-container video, .media-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        /* إخفاء الصورة في البداية */
        #after-video-img {
            display: none;
        }
    </style>
</head>
<body>

    <div class="media-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="Video mmm.MOV" type="video/mp4">
            تصفحك لا يدعم هذا الفيديو.
        </video>

        <img id="after-video-img" src="ضع_اسم_الصورة_الثابتة_هنا.jpg" alt="">
    </div>

    <script>
        const video = document.getElementById('intro-video');
        const img = document.getElementById('after-video-img');

        // أول ما الفيديو يخلص تماماً، نفذ الحركة دي:
        video.onended = function() {
            video.style.display = 'none'; // إخفاء الفيديو تماماً
            img.style.display = 'block';  // إظهار الصورة الثابتة مكانة فوراً
        };
    </script>

</body>
</html>
