<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلفية ممتدة</title>
    <style>
        /* تصفير الهوامش لمنع الفراغات البيضاء */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f0f0f0; /* لون خلفية احتياطي */
        }

        /* حاوية الصور */
        .background-container {
            display: flex;
            flex-direction: column; /* ترتيب الصور تحت بعضها */
            width: 100%;
        }

        /* ضبط إعدادات كل صورة لتملأ العرض وتتكرر بشكل عمودي */
        .bg-image {
            width: 100%;
            height: auto;
            display: block; /* يمنع وجود أي فراغات صغيرة بين الصور */
        }
    </style>
</head>
<body>

    <div class="background-container">
        <!-- تكرار الصورة 5 مرات تحت بعضها -->
        <img src="IMG_4085.jpg" alt="" class="bg-image">
        <img src="IMG_4085.jpg" alt="" class="bg-image">
        <img src="IMG_4085.jpg" alt="" class="bg-image">
        <img src="IMG_4085.jpg" alt="" class="bg-image">
        <img src="IMG_4085.jpg" alt="" class="bg-image">
    </div>

</body>
</html>
