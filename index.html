<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلفية ممتدة</title>
    <style>
        /* تصفير كل الهوامش لضمان الالتصاق التام بالسقف وبدون أي فراغات جانبية */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000000; /* لون خلفية احتياطي أسود يناسب الأطراف */
            overflow-x: hidden; /* منع السكرول العرضي المزعج */
        }

        /* حاوية الصور لترتيبها عمودياً */
        .image-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* تنسيق الصور لملء الشاشة بالكامل ومنع الفراغات البيضاء بينها */
        .image-container img {
            width: 100%;
            height: auto;
            display: block; /* يلغي أي فراغات هوائية بين الصور */
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="E4e56a87-2e02-42bf-9c00-ad76cf0b724f.JPG" alt="الصورة العلوية">

        <img src="image.png" alt="">
        <img src="image.png" alt="">
        <img src="image.png" alt="">
        <img src="image.png" alt="">
        <img src="image.png" alt="">
    </div>

</body>
</html>
