<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلفية ممتدة متناسقة</title>
    <style>
        /* إزالة الهوامش والفراغات تماماً من المتصفح ومن أعلى الصفحة */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f0f0f0;
        }

        /* حاوية تجمع كل الصور تحت بعضها */
        .image-stream {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* تنسيق الصور لملء العرض ومنع الفراغات بينها */
        .image-stream img {
            width: 100%;
            height: auto;
            display: block; /* يضمن عدم ترك فراغ أبيض بين الصورتين */
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="image-stream">
        <!-- الصورة الأولى الملاصقة للسقف تماماً -->
        <img src="E4e56a87-2e02-42bf-9c00-ad76cf0b724f.JPG" alt="الصورة العلوية">

        <!-- الصور المكررة 5 مرات بالأسفل منها لتأثير السكرول -->
        <img src="IMG_4085.jpg" alt="">
        <img src="IMG_4085.jpg" alt="">
        <img src="IMG_4085.jpg" alt="">
        <img src="IMG_4085.jpg" alt="">
        <img src="IMG_4085.jpg" alt="">
    </div>

</body>
</html>
